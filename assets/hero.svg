<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1520"/>
      <stop offset="100%" stop-color="#1e1220"/>
    </linearGradient>
    <linearGradient id="card-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#152a1e"/>
      <stop offset="100%" stop-color="#121e16"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="840" height="470" rx="12" fill="url(#bg)"/>

  <!-- ═══════ LEFT SIDE: WITHOUT ═══════ -->
  <text x="210" y="38" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" fill="#f38ba8" font-weight="700">Without claude-senior</text>

  <!-- Divider -->
  <line x1="420" y1="16" x2="420" y2="454" stroke="#313244" stroke-width="1"/>

  <!-- Chat bubble 1 -->
  <rect x="24" y="56" width="380" height="52" rx="8" fill="url(#card-l)"/>
  <rect x="24" y="56" width="3" height="52" rx="1.5" fill="#f38ba8"/>
  <text x="42" y="75" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#cdd6f4" font-weight="600">🤖  "Done! I've fixed the tax calculator."</text>
  <text x="42" y="96" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#f38ba8">→ 3 tests failing, console.log left in code</text>

  <!-- Chat bubble 2 -->
  <rect x="24" y="120" width="380" height="52" rx="8" fill="url(#card-l)"/>
  <rect x="24" y="120" width="3" height="52" rx="1.5" fill="#f38ba8"/>
  <text x="42" y="139" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#cdd6f4" font-weight="600">🤖  "Updated the function signature."</text>
  <text x="42" y="160" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#f38ba8">→ 4 callers still use the old signature</text>

  <!-- Chat bubble 3 -->
  <rect x="24" y="184" width="380" height="52" rx="8" fill="url(#card-l)"/>
  <rect x="24" y="184" width="3" height="52" rx="1.5" fill="#f38ba8"/>
  <text x="42" y="203" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#cdd6f4" font-weight="600">🤖  "Committed the changes."</text>
  <text x="42" y="224" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#f38ba8">→ const data: any, catch (e) {}, TODO: fix</text>

  <!-- Chat bubble 4 -->
  <rect x="24" y="248" width="380" height="52" rx="8" fill="url(#card-l)"/>
  <rect x="24" y="248" width="3" height="52" rx="1.5" fill="#f38ba8"/>
  <text x="42" y="267" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#cdd6f4" font-weight="600">🤖  "Let me clean up with git reset --hard"</text>
  <text x="42" y="288" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#f38ba8">→ All uncommitted work destroyed</text>

  <!-- Bottom left -->
  <rect x="74" y="322" width="280" height="36" rx="18" fill="none" stroke="#f38ba8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="214" y="345" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#f38ba8" font-weight="500">You won't catch it. You never read the code.</text>

  <!-- ═══════ RIGHT SIDE: WITH ═══════ -->
  <text x="630" y="38" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" fill="#a6e3a1" font-weight="700">With claude-senior</text>

  <!-- Chat bubble 5 -->
  <rect x="436" y="56" width="380" height="52" rx="8" fill="url(#card-r)"/>
  <rect x="436" y="56" width="3" height="52" rx="1.5" fill="#a6e3a1"/>
  <text x="454" y="75" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#cdd6f4" font-weight="600">🤖  git commit → BLOCKED</text>
  <text x="454" y="96" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#a6e3a1">✓ ruff  ✓ pytest  ✓ tsc  ✓ eslint — then fix and retry</text>

  <!-- Chat bubble 6 -->
  <rect x="436" y="120" width="380" height="52" rx="8" fill="url(#card-r)"/>
  <rect x="436" y="120" width="3" height="52" rx="1.5" fill="#a6e3a1"/>
  <text x="454" y="139" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#cdd6f4" font-weight="600">🛡️  Diff analysis catches anti-patterns</text>
  <text x="454" y="160" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#a6e3a1">console.log · any · catch {} · TODO — all blocked</text>

  <!-- Chat bubble 7 -->
  <rect x="436" y="184" width="380" height="52" rx="8" fill="url(#card-r)"/>
  <rect x="436" y="184" width="3" height="52" rx="1.5" fill="#a6e3a1"/>
  <text x="454" y="203" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#cdd6f4" font-weight="600">🔍  RIPPLE CHECK after every edit</text>
  <text x="454" y="224" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#a6e3a1">calculate_tax → used in api.py, service.py, views.py</text>

  <!-- Chat bubble 8 -->
  <rect x="436" y="248" width="380" height="52" rx="8" fill="url(#card-r)"/>
  <rect x="436" y="248" width="3" height="52" rx="1.5" fill="#a6e3a1"/>
  <text x="454" y="267" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#cdd6f4" font-weight="600">🚫  git reset --hard → BLOCKED</text>
  <text x="454" y="288" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#a6e3a1">force push · rm -rf · .env writes — all caught</text>

  <!-- Bottom right -->
  <rect x="486" y="322" width="290" height="36" rx="18" fill="none" stroke="#a6e3a1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="631" y="345" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#a6e3a1" font-weight="500">The AI catches its own mistakes. Automatically.</text>

  <!-- ═══════ BOTTOM: Stats ═══════ -->
  <rect x="100" y="384" width="170" height="50" rx="8" fill="#1a1a2e" stroke="#313244" stroke-width="1"/>
  <text x="185" y="408" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#89b4fa" font-weight="700">7 hooks</text>
  <text x="185" y="425" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#6c7086">automated enforcement</text>

  <rect x="335" y="384" width="170" height="50" rx="8" fill="#1a1a2e" stroke="#313244" stroke-width="1"/>
  <text x="420" y="408" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#cba6f7" font-weight="700">10 rules</text>
  <text x="420" y="425" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#6c7086">behavioral shaping</text>

  <rect x="570" y="384" width="170" height="50" rx="8" fill="#1a1a2e" stroke="#313244" stroke-width="1"/>
  <text x="655" y="408" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#fab387" font-weight="700">3 min</text>
  <text x="655" y="425" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#6c7086">to install</text>

  <text x="420" y="460" text-anchor="middle" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#585b70">git clone github.com/Antrakt92/claude-senior &amp;&amp; bash install.sh</text>
</svg>
