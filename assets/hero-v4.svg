<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420">
  <defs>
    <clipPath id="c">
      <rect width="820" height="420" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#c)">
    <!-- Background -->
    <rect width="820" height="420" fill="#1e1e2e"/>

    <!-- Title bar -->
    <rect width="820" height="36" fill="#181825"/>
    <circle cx="20" cy="18" r="6" fill="#f38ba8" opacity="0.8"/>
    <circle cx="38" cy="18" r="6" fill="#f9e2af" opacity="0.8"/>
    <circle cx="56" cy="18" r="6" fill="#a6e3a1" opacity="0.8"/>
    <text x="410" y="23" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#585b70">claude-senior</text>

    <!-- ══════ Section 1: Pre-commit quality gate ══════ -->

    <text x="28" y="62" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5">
      <tspan fill="#a6e3a1">$</tspan>
      <tspan fill="#cdd6f4"> git commit -m "fix: update tax calculator"</tspan>
    </text>

    <text x="28" y="88" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5">
      <tspan fill="#f38ba8" font-weight="bold">COMMIT BLOCKED</tspan>
      <tspan fill="#6c7086"> — Auto-checks failed (3 files, 47 insertions)</tspan>
    </text>

    <text x="28" y="114" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5" fill="#f9e2af">PYTEST FAILED:</text>
    <text x="52" y="132" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5">
      <tspan fill="#6c7086">FAILED </tspan>
      <tspan fill="#89b4fa">tests/test_tax.py::test_exit_tax</tspan>
      <tspan fill="#6c7086"> - assert 0.38 != 0.41</tspan>
    </text>

    <text x="28" y="158" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5">
      <tspan fill="#f9e2af">TYPE 'any' FOUND</tspan>
      <tspan fill="#6c7086"> in staged TS changes — use proper types:</tspan>
    </text>
    <text x="52" y="176" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5">
      <tspan fill="#6c7086">+const data: </tspan>
      <tspan fill="#f38ba8">any</tspan>
      <tspan fill="#6c7086"> = fetchTaxRates(year);</tspan>
    </text>

    <text x="28" y="200" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13" fill="#585b70">Fix the errors above, then retry commit.</text>

    <!-- Separator -->
    <line x1="28" y1="218" x2="792" y2="218" stroke="#313244" stroke-width="1"/>

    <!-- ══════ Section 2: Destructive command blocked ══════ -->

    <text x="28" y="240" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5">
      <tspan fill="#a6e3a1">$</tspan>
      <tspan fill="#cdd6f4"> git push --force origin main</tspan>
    </text>

    <text x="28" y="264" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5">
      <tspan fill="#f38ba8" font-weight="bold">BLOCKED:</tspan>
      <tspan fill="#cdd6f4"> git push --force can destroy remote history.</tspan>
    </text>
    <text x="28" y="282" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13" fill="#585b70">Use --force-with-lease if you must.</text>

    <!-- Separator -->
    <line x1="28" y1="300" x2="792" y2="300" stroke="#313244" stroke-width="1"/>

    <!-- ══════ Section 3: Ripple check warning ══════ -->

    <text x="28" y="322" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5">
      <tspan fill="#fab387" font-weight="bold">RIPPLE CHECK:</tspan>
      <tspan fill="#6c7086"> definitions in </tspan>
      <tspan fill="#cdd6f4">calculator.py</tspan>
      <tspan fill="#6c7086"> are also used in:</tspan>
    </text>
    <text x="52" y="342" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5">
      <tspan fill="#cdd6f4">calculate_tax</tspan>
      <tspan fill="#6c7086"> → </tspan>
      <tspan fill="#89b4fa">service.py:42  api.py:18  test_tax.py:3</tspan>
    </text>
    <text x="52" y="362" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13.5">
      <tspan fill="#cdd6f4">TaxRates</tspan>
      <tspan fill="#6c7086"> → </tspan>
      <tspan fill="#89b4fa">views.py:7</tspan>
    </text>
    <text x="28" y="382" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="13" fill="#585b70">Did you update all callers?</text>

    <!-- Bottom install command -->
    <line x1="28" y1="398" x2="792" y2="398" stroke="#313244" stroke-width="1" opacity="0.3"/>
    <text x="410" y="414" text-anchor="middle" font-family="SF Mono,Cascadia Code,Fira Code,Consolas,monospace" font-size="11.5" fill="#45475a">git clone github.com/Antrakt92/claude-senior &amp;&amp; bash install.sh</text>
  </g>
</svg>
