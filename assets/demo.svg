<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440">
  <style>
    /* WHY 12s total: 6s blocked scene + 1s transition + 4s success scene + 1s transition */
    @keyframes scene1 { 0%,4% { opacity: 0 } 6%,48% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes scene2 { 0%,52% { opacity: 0 } 55%,95% { opacity: 1 } 98%,100% { opacity: 0 } }

    /* Staggered line reveals within each scene */
    @keyframes line1 { 0%,8% { opacity: 0 } 10%,48% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes line2 { 0%,12% { opacity: 0 } 14%,48% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes line3 { 0%,16% { opacity: 0 } 18%,48% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes line4 { 0%,20% { opacity: 0 } 22%,48% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes line5 { 0%,24% { opacity: 0 } 26%,48% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes line6 { 0%,28% { opacity: 0 } 30%,48% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes line7 { 0%,32% { opacity: 0 } 34%,48% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes line8 { 0%,36% { opacity: 0 } 38%,48% { opacity: 1 } 50%,100% { opacity: 0 } }

    @keyframes s2line1 { 0%,56% { opacity: 0 } 58%,95% { opacity: 1 } 98%,100% { opacity: 0 } }
    @keyframes s2line2 { 0%,60% { opacity: 0 } 62%,95% { opacity: 1 } 98%,100% { opacity: 0 } }
    @keyframes s2line3 { 0%,64% { opacity: 0 } 66%,95% { opacity: 1 } 98%,100% { opacity: 0 } }
    @keyframes s2line4 { 0%,68% { opacity: 0 } 70%,95% { opacity: 1 } 98%,100% { opacity: 0 } }
    @keyframes s2line5 { 0%,72% { opacity: 0 } 74%,95% { opacity: 1 } 98%,100% { opacity: 0 } }
    @keyframes s2line6 { 0%,78% { opacity: 0 } 80%,95% { opacity: 1 } 98%,100% { opacity: 0 } }
    @keyframes s2line7 { 0%,82% { opacity: 0 } 84%,95% { opacity: 1 } 98%,100% { opacity: 0 } }

    @keyframes cursor { 0%,100% { opacity: 1 } 50% { opacity: 0 } }

    .bg { fill: #1e1e2e; }
    .bar { fill: #313244; }
    .t { font-family: 'SF Mono','Cascadia Code','Fira Code',Consolas,monospace; font-size: 13.5px; }
    .prompt { fill: #a6e3a1; }
    .cmd { fill: #cdd6f4; }
    .red { fill: #f38ba8; }
    .redb { fill: #f38ba8; font-weight: bold; }
    .orange { fill: #fab387; }
    .green { fill: #a6e3a1; }
    .greenb { fill: #a6e3a1; font-weight: bold; }
    .dim { fill: #585b70; }
    .title { fill: #bac2de; font-size: 12px; }

    .s1 { animation: scene1 12s ease infinite; }
    .l1 { animation: line1 12s ease infinite; }
    .l2 { animation: line2 12s ease infinite; }
    .l3 { animation: line3 12s ease infinite; }
    .l4 { animation: line4 12s ease infinite; }
    .l5 { animation: line5 12s ease infinite; }
    .l6 { animation: line6 12s ease infinite; }
    .l7 { animation: line7 12s ease infinite; }
    .l8 { animation: line8 12s ease infinite; }

    .s2 { animation: scene2 12s ease infinite; }
    .s2l1 { animation: s2line1 12s ease infinite; }
    .s2l2 { animation: s2line2 12s ease infinite; }
    .s2l3 { animation: s2line3 12s ease infinite; }
    .s2l4 { animation: s2line4 12s ease infinite; }
    .s2l5 { animation: s2line5 12s ease infinite; }
    .s2l6 { animation: s2line6 12s ease infinite; }
    .s2l7 { animation: s2line7 12s ease infinite; }
  </style>

  <!-- Terminal chrome -->
  <rect class="bg" width="820" height="440" rx="10"/>
  <rect class="bar" width="820" height="36" rx="10"/>
  <rect class="bg" y="26" width="820" height="10"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#fab387"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="410" y="22" text-anchor="middle" class="title t">claude-senior</text>

  <!-- ═══════ SCENE 1: BLOCKED ═══════ -->
  <g class="s1">
    <text x="20" y="62" class="t prompt">❯</text>
    <text x="40" y="62" class="t cmd">git commit -m "feat: add tax calculator"</text>
  </g>

  <g class="l1">
    <text x="20" y="94" class="t redb">COMMIT BLOCKED — Diff analysis found issues</text>
  </g>

  <g class="l2">
    <text x="20" y="128" class="t red">✗</text>
    <text x="40" y="128" class="t orange">CONSOLE.LOG FOUND in staged changes</text>
  </g>
  <g class="l3">
    <text x="50" y="150" class="t dim">+  console.log("tax:", totalTax);</text>
  </g>

  <g class="l4">
    <text x="20" y="182" class="t red">✗</text>
    <text x="40" y="182" class="t orange">TYPE 'any' FOUND in staged TS changes</text>
  </g>
  <g class="l5">
    <text x="50" y="204" class="t dim">+  function process(input: any): any {</text>
  </g>

  <g class="l6">
    <text x="20" y="236" class="t red">✗</text>
    <text x="40" y="236" class="t orange">EMPTY CATCH found — add error handling</text>
  </g>
  <g class="l7">
    <text x="50" y="258" class="t dim">+  } catch (e) {}</text>
  </g>

  <g class="l8">
    <text x="20" y="296" class="t redb">Fix the issues above, then retry commit.</text>
  </g>

  <!-- ═══════ SCENE 2: FIXED ═══════ -->
  <g class="s2">
    <text x="20" y="62" class="t prompt">❯</text>
    <text x="40" y="62" class="t cmd">git commit -m "feat: add tax calculator"</text>
  </g>

  <g class="s2l1">
    <text x="20" y="94" class="t green">✓</text>
    <text x="40" y="94" class="t green">ruff check</text>
    <text x="140" y="94" class="t dim">passed</text>
  </g>
  <g class="s2l2">
    <text x="20" y="118" class="t green">✓</text>
    <text x="40" y="118" class="t green">pytest 357 tests</text>
    <text x="210" y="118" class="t dim">passed in 14.2s</text>
  </g>
  <g class="s2l3">
    <text x="20" y="142" class="t green">✓</text>
    <text x="40" y="142" class="t green">tsc --noEmit</text>
    <text x="170" y="142" class="t dim">passed</text>
  </g>
  <g class="s2l4">
    <text x="20" y="166" class="t green">✓</text>
    <text x="40" y="166" class="t green">eslint --max-warnings 0</text>
    <text x="280" y="166" class="t dim">passed</text>
  </g>
  <g class="s2l5">
    <text x="20" y="190" class="t green">✓</text>
    <text x="40" y="190" class="t green">diff analysis</text>
    <text x="180" y="190" class="t dim">clean</text>
  </g>

  <g class="s2l6">
    <text x="20" y="228" class="t greenb">[main a1b2c3d] feat: add tax calculator</text>
  </g>

  <g class="s2l7">
    <text x="20" y="268" class="t orange">RIPPLE CHECK: calculate_tax also used in:</text>
    <text x="30" y="290" class="t dim">  calculate_tax → api.py:42  service.py:18  views.py:7</text>
    <text x="30" y="312" class="t dim">  Did you update all callers?</text>
  </g>
</svg>
