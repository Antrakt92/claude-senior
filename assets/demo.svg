<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252540"/>
      <stop offset="100%" stop-color="#1e1e35"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="840" height="540" rx="12" fill="url(#bg)"/>

  <!-- Top badge -->
  <rect x="310" y="14" width="220" height="28" rx="14" fill="#252540" stroke="#454570" stroke-width="1"/>
  <text x="420" y="33" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#6c7086" font-weight="500">claude-senior v1.0</text>

  <!-- ═══════ SCENE 1: WITHOUT ═══════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.03;0.06;0.46;0.49;0.5;1" dur="14s" repeatCount="indefinite"/>

    <text x="420" y="78" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="22" fill="#f38ba8" font-weight="700">Without claude-senior</text>
    <text x="420" y="102" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#6c7086">Claude Code ships broken code and calls it "done"</text>

    <!-- Card 1 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.08;0.12;0.46;0.49;1" dur="14s" repeatCount="indefinite"/>
      <rect x="40" y="124" width="360" height="88" rx="10" fill="url(#card)"/>
      <rect x="40" y="124" width="4" height="88" rx="2" fill="#f38ba8"/>
      <text x="62" y="153" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#f38ba8">✗</text>
      <text x="88" y="152" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#cdd6f4" font-weight="600">Commits console.log &amp; any types</text>
      <text x="88" y="174" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#585b70">console.log("debug:", data)</text>
      <text x="88" y="194" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#585b70">function process(x: any): any { }</text>
    </g>

    <!-- Card 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.15;0.19;0.46;0.49;1" dur="14s" repeatCount="indefinite"/>
      <rect x="440" y="124" width="360" height="88" rx="10" fill="url(#card)"/>
      <rect x="440" y="124" width="4" height="88" rx="2" fill="#f38ba8"/>
      <text x="462" y="153" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#f38ba8">✗</text>
      <text x="488" y="152" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#cdd6f4" font-weight="600">Changes function, forgets callers</text>
      <text x="488" y="174" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#585b70">Changed calculate_tax() signature</text>
      <text x="488" y="194" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#585b70">4 files still call the old version</text>
    </g>

    <!-- Card 3 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.22;0.26;0.46;0.49;1" dur="14s" repeatCount="indefinite"/>
      <rect x="40" y="232" width="360" height="88" rx="10" fill="url(#card)"/>
      <rect x="40" y="232" width="4" height="88" rx="2" fill="#f38ba8"/>
      <text x="62" y="261" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#f38ba8">✗</text>
      <text x="88" y="260" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#cdd6f4" font-weight="600">Says "done" without running tests</text>
      <text x="88" y="282" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#585b70">"I've fixed the bug" → tests are broken</text>
      <text x="88" y="302" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#585b70">"Should work" = hasn't verified</text>
    </g>

    <!-- Card 4 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.29;0.33;0.46;0.49;1" dur="14s" repeatCount="indefinite"/>
      <rect x="440" y="232" width="360" height="88" rx="10" fill="url(#card)"/>
      <rect x="440" y="232" width="4" height="88" rx="2" fill="#f38ba8"/>
      <text x="462" y="261" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#f38ba8">✗</text>
      <text x="488" y="260" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#cdd6f4" font-weight="600">Runs git push --force, rm -rf</text>
      <text x="488" y="282" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#585b70">Destroys remote history</text>
      <text x="488" y="302" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#585b70">Deletes source directories</text>
    </g>

    <!-- Tagline scene 1 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.38;0.46;0.49;1" dur="14s" repeatCount="indefinite"/>
      <rect x="200" y="348" width="440" height="42" rx="21" fill="none" stroke="#f38ba8" stroke-width="1.5" stroke-opacity="0.5"/>
      <text x="420" y="375" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#f38ba8" font-weight="600">You won't catch it — you never read the code</text>
    </g>
  </g>

  <!-- ═══════ SCENE 2: WITH ═══════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.49;0.5;0.52;0.55;0.95;1" dur="14s" repeatCount="indefinite"/>

    <text x="420" y="78" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="22" fill="#a6e3a1" font-weight="700">With claude-senior</text>
    <text x="420" y="102" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#6c7086">7 hooks + 10 behavioral rules + persistent memory</text>

    <!-- Card 5 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.57;0.61;0.95;1" dur="14s" repeatCount="indefinite"/>
      <rect x="40" y="124" width="360" height="88" rx="10" fill="url(#card)"/>
      <rect x="40" y="124" width="4" height="88" rx="2" fill="#a6e3a1"/>
      <text x="62" y="153" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#a6e3a1">✓</text>
      <text x="88" y="152" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#cdd6f4" font-weight="600">Blocks bad code before commit</text>
      <text x="88" y="174" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#a6e3a1">console.log → BLOCKED</text>
      <text x="88" y="194" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#a6e3a1">any types → BLOCKED · catch {} → BLOCKED</text>
    </g>

    <!-- Card 6 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.64;0.68;0.95;1" dur="14s" repeatCount="indefinite"/>
      <rect x="440" y="124" width="360" height="88" rx="10" fill="url(#card)"/>
      <rect x="440" y="124" width="4" height="88" rx="2" fill="#a6e3a1"/>
      <text x="462" y="153" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#a6e3a1">✓</text>
      <text x="488" y="152" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#cdd6f4" font-weight="600">Warns about affected callers</text>
      <text x="488" y="174" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#a6e3a1">RIPPLE CHECK: calculate_tax used in</text>
      <text x="488" y="194" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#a6e3a1">→ api.py:42  service.py:18  views.py:7</text>
    </g>

    <!-- Card 7 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.71;0.75;0.95;1" dur="14s" repeatCount="indefinite"/>
      <rect x="40" y="232" width="360" height="88" rx="10" fill="url(#card)"/>
      <rect x="40" y="232" width="4" height="88" rx="2" fill="#a6e3a1"/>
      <text x="62" y="261" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#a6e3a1">✓</text>
      <text x="88" y="260" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#cdd6f4" font-weight="600">Runs all checks automatically</text>
      <text x="88" y="282" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#a6e3a1">ruff ✓  pytest ✓  tsc ✓  eslint ✓</text>
      <text x="88" y="302" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#a6e3a1">No bypass. Fix the code, retry.</text>
    </g>

    <!-- Card 8 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.78;0.82;0.95;1" dur="14s" repeatCount="indefinite"/>
      <rect x="440" y="232" width="360" height="88" rx="10" fill="url(#card)"/>
      <rect x="440" y="232" width="4" height="88" rx="2" fill="#a6e3a1"/>
      <text x="462" y="261" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#a6e3a1">✓</text>
      <text x="488" y="260" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#cdd6f4" font-weight="600">Blocks destructive commands</text>
      <text x="488" y="282" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#a6e3a1">git push --force → BLOCKED</text>
      <text x="488" y="302" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#a6e3a1">rm -rf src/ → BLOCKED · .env → BLOCKED</text>
    </g>

    <!-- Tagline scene 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.83;0.86;0.95;1" dur="14s" repeatCount="indefinite"/>
      <rect x="175" y="348" width="490" height="42" rx="21" fill="none" stroke="#a6e3a1" stroke-width="1.5" stroke-opacity="0.5"/>
      <text x="420" y="375" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#a6e3a1" font-weight="600">The AI catches its own mistakes before you see them</text>
    </g>
  </g>

  <!-- ═══════ ALWAYS VISIBLE: Stats + Install ═══════ -->
  <rect x="80" y="415" width="200" height="60" rx="10" fill="url(#card)"/>
  <text x="180" y="443" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="22" fill="#89b4fa" font-weight="700">7</text>
  <text x="180" y="463" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#6c7086">automated hooks</text>

  <rect x="320" y="415" width="200" height="60" rx="10" fill="url(#card)"/>
  <text x="420" y="443" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="22" fill="#cba6f7" font-weight="700">10</text>
  <text x="420" y="463" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#6c7086">behavioral rules</text>

  <rect x="560" y="415" width="200" height="60" rx="10" fill="url(#card)"/>
  <text x="660" y="443" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="22" fill="#fab387" font-weight="700">3 min</text>
  <text x="660" y="463" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#6c7086">to install</text>

  <text x="420" y="506" text-anchor="middle" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#585b70">git clone github.com/Antrakt92/claude-senior &amp;&amp; bash install.sh</text>
  <text x="420" y="530" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#6c7086">⭐ Star if this saved your AI from shipping broken code</text>
</svg>
